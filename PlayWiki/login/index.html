<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main class="mainLogin">

        <h3 class="loginTop">Faça Seu Login</h3>
        <a class="email"> E-mail:</a><br>
        <input class="inEmail" type="email" placeholder="Coloque seu email" onkeypress="enviarbut(event)" id="email"></input><br>

        <a class="senha"> Senha:</a><br>
        <input class="inSenha" type="password" placeholder="Coloque sua senha" onkeypress="enviarbut(event)" id="senha"></input>
        
        <button onclick="enviar()" onkeypress="enviarbut(event)" type="submit">Entrar</button>

    </main>
    <script src="script.js"></script>
</body>
</html>
